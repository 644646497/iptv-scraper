name: Scrape IPTV

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install requests
      - name: Run
        run: python scraper.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git add live.m3u
          git diff --quiet --staged || git commit -m "更新源"
          git push
